{% extends 'admin/base_site.html' %}

{% block content %}
  <h1>Log in to admin interface</h1>
  <form action="" method="post">
    {% csrf_token %}
    <table>
      <tr>
        <td>{{ form.username.label_tag }}</td>
        <td>{{ form.username }}</td>
      </tr>
      <tr>
        <td>{{ form.password.label_tag }}</td>
        <td>{{ form.password }}</td>
      </tr>
    </table>
    <input type="submit" value="Log in">
  </form>
{% endblock %}
